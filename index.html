<!-- ILAGAY LANG ITO SA CSS MO (dagdag lang, huwag burahin ang text content mo) -->

<style>
/* FLOATING CARD */
.card{
    animation:cardFloat 5s ease-in-out infinite;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    inset:-3px;
    border-radius:30px;
    background:linear-gradient(
        45deg,
        #ff4d6d,
        #ffffff,
        #ff8fab,
        #ffffff,
        #ff4d6d
    );
    background-size:400% 400%;
    animation:borderGlow 8s linear infinite;
    z-index:-1;
}

@keyframes borderGlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes cardFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* TITLE GLOW */
h1{
    animation:titleGlow 2s ease-in-out infinite;
}

@keyframes titleGlow{
    0%,100%{
        text-shadow:
        0 0 10px white,
        0 0 20px #ff8fab,
        0 0 40px #ff4d6d;
    }
    50%{
        text-shadow:
        0 0 20px white,
        0 0 40px #ff8fab,
        0 0 80px #ff4d6d;
    }
}

/* BUTTON EFFECTS */
.btn{
    background:linear-gradient(45deg,#fff,#ffe5ec);
    box-shadow:
        0 0 20px rgba(255,255,255,.5),
        0 0 40px rgba(255,105,180,.4);
    animation:buttonPulse 2s infinite;
    position:relative;
    overflow:hidden;
}

.btn:hover{
    transform:translateY(-3px) scale(1.12);
    box-shadow:
        0 0 30px white,
        0 0 60px #ff8fab;
}

.btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.8),
        transparent
    );
    transition:.8s;
}

.btn:hover::before{
    left:100%;
}

@keyframes buttonPulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

@keyframes ripple{
    from{
        width:0;
        height:0;
        opacity:1;
    }
    to{
        width:300px;
        height:300px;
        opacity:0;
    }
}
</style>

<!-- ILAGAY ITO SA DULO NG SCRIPT MO -->

<script>
// RIPPLE BUTTON EFFECT
document.querySelector(".btn").addEventListener("click",function(e){

    const ripple=document.createElement("span");

    ripple.style.position="absolute";
    ripple.style.width="20px";
    ripple.style.height="20px";
    ripple.style.borderRadius="50%";
    ripple.style.background="rgba(255,255,255,.8)";
    ripple.style.left=e.offsetX+"px";
    ripple.style.top=e.offsetY+"px";
    ripple.style.transform="translate(-50%,-50%)";
    ripple.style.animation="ripple .8s linear";

    this.appendChild(ripple);

    setTimeout(()=>{
        ripple.remove();
    },800);
});

// MOUSE SPARKLE TRAIL
document.addEventListener("mousemove",(e)=>{

    const sparkle=document.createElement("div");

    sparkle.innerHTML="✨";
    sparkle.style.position="fixed";
    sparkle.style.left=e.clientX+"px";
    sparkle.style.top=e.clientY+"px";
    sparkle.style.pointerEvents="none";
    sparkle.style.zIndex="999";

    document.body.appendChild(sparkle);

    sparkle.animate([
        {
            transform:"translateY(0px)",
            opacity:1
        },
        {
            transform:"translateY(-30px)",
            opacity:0
        }
    ],{
        duration:800
    });

    setTimeout(()=>{
        sparkle.remove();
    },800);
});

// PALITAN ANG CELEBRATE FUNCTION MO NG ITO
function celebrate(){

    for(let i=0;i<250;i++){

        const confetti=document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left=Math.random()*100+"vw";

        confetti.innerHTML=
        ["🎉","✨","💖","💕","💗","💞","⭐","🎂"]
        [Math.floor(Math.random()*8)];

        confetti.style.background="transparent";

        confetti.style.fontSize=
        (10+Math.random()*20)+"px";

        confetti.style.animationDuration=
        (2+Math.random()*3)+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}
</script>
